name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: msm_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d msm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MSM_TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/msm_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  web-checks:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run web:typecheck

      - name: Test
        run: npm run web:test

  build:
    name: Build ${{ matrix.artifact_name }}
    needs:
      - rust-checks
      - web-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: msm-linux-x64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: msm-linux-arm64
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: msm-linux-x64-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: msm-linux-arm64-musl
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: msm-darwin-x64
            use_cross: false
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: msm-darwin-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: msm-windows-x64.exe
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
          save-if: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Web dependencies
        run: npm ci

      - name: Build Web UI
        run: npm run web:build

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked -p msm-app --target ${{ matrix.target }}
          else
            cargo build --release --locked -p msm-app --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/msm-app"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="${binary}.exe"
          fi
          cp "$binary" "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
